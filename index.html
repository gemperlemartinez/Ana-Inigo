<form>
    <!-- Existing form fields -->
    <label for="alpargatas">¿Necesitas alpargatas?</label>
    <select id="alpargatas" name="alpargatas" onchange="toggleTallaGroup(this)">
        <option value="no">No, no las necesito</option>
        <option value="si">Sí, las necesito</option>
    </select>
    
    <div id="tallaGroup" style="display: none;">
        <label for="shoeSize">Talla de zapato:</label>
        <input type="text" id="shoeSize" name="shoeSize" placeholder="Ingresa tu talla">
    </div>
    
    <input type="submit" value="Enviar">
</form>

<script>
function toggleTallaGroup(selectElement) {
    const tallaGroup = document.getElementById('tallaGroup');
    if (selectElement.value === 'si') {
        tallaGroup.style.display = 'block';
    } else {
        tallaGroup.style.display = 'none';
    }
}

document.querySelector('form').onsubmit = function() {
    const shoeSize = document.getElementById('shoeSize').value;
    // Add logic to capture the shoe size value before submission
    console.log('Shoe size:', shoeSize);
};
</script>
